    window.storage = {
      _p: 'spaintax_',
      set: async function(k, v) {
        try { localStorage.setItem(this._p + k, v); } catch(e) {}
        return { key: k, value: v };
      },
      get: async function(k) {
        const v = localStorage.getItem(this._p + k);
        if (!v) throw new Error('Not found');
        return { key: k, value: v };
      },
      delete: async function(k) {
        localStorage.removeItem(this._p + k);
        return { key: k, deleted: true };
      },
      list: async function(prefix) {
        const keys = [];
        for(let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if(k && k.startsWith(this._p + (prefix||''))) keys.push(k.replace(this._p, ''));
        }
        return { keys };
      }
    };

// ─── TAX ENGINE ───────────────────────────────────────────────────────────────
const SCALES = {
  madrid:    [{min:0,max:12450,r:.18},{min:12450,max:20200,r:.23},{min:20200,max:35200,r:.285},{min:35200,max:60000,r:.355},{min:60000,max:300000,r:.435},{min:300000,max:Infinity,r:.455}],
  catalonia: [{min:0,max:12450,r:.20},{min:12450,max:20200,r:.25},{min:20200,max:35200,r:.31},{min:35200,max:60000,r:.38},{min:60000,max:175000,r:.46},{min:175000,max:300000,r:.48},{min:300000,max:Infinity,r:.50}],
  general:   [{min:0,max:12450,r:.19},{min:12450,max:20200,r:.24},{min:20200,max:35200,r:.30},{min:35200,max:60000,r:.37},{min:60000,max:300000,r:.45},{min:300000,max:Infinity,r:.47}],
};
SCALES.andalusia = SCALES.madrid;
SCALES.valencia  = SCALES.catalonia;

const SAV = [{min:0,max:6000,r:.19},{min:6000,max:50000,r:.21},{min:50000,max:200000,r:.23},{min:200000,max:300000,r:.27},{min:300000,max:Infinity,r:.30}];
const CHILD_ALLOW = [2400,2700,4000,4500];
const PERSONAL = {single:5550,married:6700,family:5550};

function calcBrackets(base, table) {
  let tax=0, det=[];
  for(const b of table){
    if(base<=b.min) break;
    const chunk=Math.min(base, b.max===Infinity?base+1:b.max)-b.min;
    tax+=chunk*b.r;
    det.push({min:b.min,max:b.max,r:b.r*100,chunk,tax:chunk*b.r});
  }
  return {tax,det};
}

function getAutonomoSS(netYield) {
  const m=netYield/12;
  if(m<=670)  return 200*12;
  if(m<=900)  return 260*12;
  if(m<=1166) return 290*12;
  if(m<=1700) return 330*12;
  if(m<=2330) return 370*12;
  if(m<=3620) return 440*12;
  if(m<=6000) return 530*12;
  return 590*12;
}

function childAllow(n,under3){ let a=0; for(let i=0;i<n;i++) a+=i<4?CHILD_ALLOW[i]:CHILD_ALLOW[3]; if(under3&&n>0) a+=2800; return a; }
function fnCredit(fn){ return fn==="general"?1200:fn==="special"?2400:0; }

function runCalc(f){
  const emp  = f.type!=="autonomo"?f.gross:0;
  const aut  = f.type!=="employee"?f.auto:0;
  const work = emp+aut;
  const gross= work+f.foreign+f.savings;
  const ssEmp= f.type!=="autonomo"?Math.min(emp*.0635,4495):0;
  const ssAut= f.type!=="employee"&&aut>0?(f.autonomoTarifa?86.65*12:getAutonomoSS(aut*.93)):0;
  const ss   = ssEmp+ssAut;
  const scale= SCALES[f.region]||SCALES.general;
  const genExp  = f.type!=="autonomo"?2000:0;
  const autExp  = f.type!=="employee"?aut*.07:0;
  const taxBase = Math.max(0,work+f.foreign-ss-genExp-autExp);
  const pa   = PERSONAL[f.sit]||5550;
  const ca   = childAllow(f.kids,f.under3);
  const famMin = pa+ca;
  const extraDed = Math.min(f.rent*.15,9040)+Math.min(f.pension*.80,1500)+Math.min(f.ev*.15,3000);
  let irpf=0,det=[],bSave=0;
  if(f.beckham){
    irpf=work*.24;
    const stdTax=Math.max(0,calcBrackets(taxBase,scale).tax-calcBrackets(famMin,scale).tax-fnCredit(f.fn));
    bSave=Math.max(0,stdTax-irpf);
  } else {
    const grossTax=calcBrackets(taxBase,scale);
    const minCredit=calcBrackets(famMin,scale).tax;
    irpf=Math.max(0,grossTax.tax-minCredit-extraDed-fnCredit(f.fn));
    det=grossTax.det;
  }
  const savRes=calcBrackets(f.savings,SAV);
  const totalTax=irpf+savRes.tax+ss;
  const net=gross-totalTax;
  const qInc=aut/4;
  return {gross,ss,ca:famMin,irpf,savTax:savRes.tax,savDet:savRes.det,totalTax,net,eff:gross>0?((totalTax/gross)*100).toFixed(1):0,det,bSave,qIRPF:qInc*.20,qIVA:aut>0?qInc*.21:0,qSS:aut>0?(f.autonomoTarifa?86.65:getAutonomoSS(aut*.93)/12):0};
}

// ─── BECKHAM ENGINE ───────────────────────────────────────────────────────────
function checkBeckham(a){
  const {res,contract,dnv,qualified,ss,ssDate}=a;
  if(res==="yes") return {status:"not_eligible",reasons:[{t:"bad",ar:"كنت مقيماً ضريبياً في إسبانيا — شرط أساسي غير متحقق",en:"You were a Spanish tax resident — core condition not met",es:"Fuiste residente fiscal en España — condición básica no cumplida"}],days:null,deadline:null};
  let days=null,deadline=null;
  const reasons=[];
  if(ss==="yes"&&ssDate){
    const d=new Date(ssDate),dead=new Date(d);
    dead.setMonth(dead.getMonth()+6);
    deadline=dead.toLocaleDateString();
    days=Math.floor((dead-new Date())/86400000);
    if(days<0) return {status:"expired",reasons:[{t:"bad",ar:`انتهى ${Math.abs(days)} يوم من الموعد النهائي`,en:`${Math.abs(days)} days past the deadline`,es:`${Math.abs(days)} días pasado el plazo`}],days,deadline};
    reasons.push({t:days<30?"warn":"good",ar:`باقي ${days} يوم للتقديم على Modelo 149`,en:`${days} days left to file Modelo 149`,es:`${days} días para presentar Modelo 149`});
  }
  let status="not_eligible";
  if(contract==="yes"){
    status="eligible";
    reasons.push({t:"good",ar:"✓ عقد عمل مع شركة أجنبية — الحالة المثلى",en:"✓ Foreign employment contract — ideal case",es:"✓ Contrato con empresa extranjera — caso ideal"});
    if(dnv==="yes") reasons.push({t:"good",ar:"✓ Digital Nomad Visa تعزز أهليتك",en:"✓ Digital Nomad Visa strengthens eligibility",es:"✓ Visa Nómada Digital refuerza la elegibilidad"});
  } else if(dnv==="yes"&&qualified==="yes"){
    status="conditional";
    reasons.push({t:"warn",ar:"⚠ DNV + نشاط متخصص — محتاج تقييم Gestor",en:"⚠ DNV + qualified activity — Gestor assessment needed",es:"⚠ DNV + actividad cualificada — necesita evaluación de gestor"});
  } else {
    reasons.push({t:"bad",ar:"لا عقد أجنبي ولا DNV مؤهل — غير مؤهل",en:"No qualifying foreign contract or DNV — not eligible",es:"Sin contrato extranjero ni DNV cualificado — no elegible"});
  }
  return {status,reasons,days,deadline};
}

              const col=cols[ckRes.status];
              const titles={eligible:t.eligible,conditional:t.conditional,not_eligible:t.notEligible,expired:t.expired};
              const subs={eligible:t.eligibleSub,conditional:t.conditionalSub,not_eligible:t.notEligibleSub,expired:t.expiredSub};
              return (
                <div style={{...S.card,border:`1px solid ${col}44`,background:`${col}08`}}>
                  <div style={{fontSize:15,fontWeight:800,color:col,marginBottom:4}}>{titles[ckRes.status]}</div>
                  <div style={{fontSize:12,color:"#8b949e",marginBottom:12}}>{subs[ckRes.status]}</div>
                  {ckRes.reasons.map((r,i)=>(
                    <div key={i} style={{fontSize:12,padding:"6px 0",borderBottom:"1px solid #21262d",color:r.t==="good"?"#3fb950":r.t==="bad"?"#ff7b72":"#f0883e",lineHeight:1.5}}>
                      {r[lang]||r.en}
                    </div>
                  ))}
                  {ckRes.deadline&&<div style={{marginTop:10,padding:"8px 12px",background:"rgba(88,166,255,0.08)",borderRadius:8,fontSize:12}}><span style={{color:"#8b949e"}}>{t.deadlineLabel} </span><span style={{color:"#58a6ff",fontWeight:700}}>{ckRes.deadline}</span></div>}
                  <div style={{display:"flex",gap:8,marginTop:14,flexWrap:"wrap"}}>
                    {(ckRes.status==="eligible"||ckRes.status==="conditional")&&<button onClick={()=>setTab(1)} style={{flex:1,padding:"10px",borderRadius:8,border:"none",background:`${col}22`,color:col,fontWeight:700,cursor:"pointer",fontSize:12}}>{t.goCalc}</button>}
                    {(ckRes.status==="conditional"||ckRes.status==="expired")&&<button style={{flex:1,padding:"10px",borderRadius:8,border:"1px solid #f0883e",background:"transparent",color:"#f0883e",fontWeight:700,cursor:"pointer",fontSize:12}}>{t.gestorBtn}</button>}
                  </div>
                </div>
              );
            })()}
          </div>
        )}

        {/* TAB 1: CALCULATOR */}
        {tab===1&&(
          <div>
            <div style={S.card}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>{t.profileTitle}</div>

              <div style={{marginBottom:12}}>
                <label style={S.lbl}>{t.regionLabel}</label>
                <select style={S.sel} value={form.region} onChange={e=>setF("region",e.target.value)}>
                  {Object.entries(t.regions).map(([k,v])=>(<option key={k} value={k} style={{background:"#161b22"}}>{v}</option>))}
                </select>
              </div>

              <div style={{marginBottom:14}}>
                <label style={S.lbl}>{t.incomeType}</label>
                <div style={S.row}>{Object.entries(t.types).map(([k,v])=>(<button key={k} onClick={()=>setF("type",k)} style={S.seg(form.type===k)}>{v}</button>))}</div>
              </div>

              {form.type!=="autonomo"&&<div style={{marginBottom:12}}><label style={S.lbl}>{t.grossIncome}</label><input style={S.inp} type="number" value={form.gross} onChange={e=>setF("gross",e.target.value)} placeholder="60000"/></div>}
              {form.type!=="employee"&&<div style={{marginBottom:12}}><label style={S.lbl}>{t.autonomoIncome}</label><input style={S.inp} type="number" value={form.auto} onChange={e=>setF("auto",e.target.value)} placeholder="40000"/></div>}
              <div style={{marginBottom:12}}><label style={S.lbl}>{t.foreignIncome}</label><input style={S.inp} type="number" value={form.foreign} onChange={e=>setF("foreign",e.target.value)} placeholder="0"/></div>
              <div style={{marginBottom:14}}><label style={S.lbl}>{t.savingsIncome}</label><input style={S.inp} type="number" value={form.savings} onChange={e=>setF("savings",e.target.value)} placeholder="0"/></div>

              {form.type!=="employee"&&(
                <div style={{marginBottom:14,padding:10,background:"rgba(240,136,62,0.05)",borderRadius:8,border:"1px solid rgba(240,136,62,0.15)"}}>
                  <label style={{...S.lbl,color:"#f0883e"}}>{t.autonomoTarifa}</label>
                  <div style={S.row}>
                    <button onClick={()=>setF("autonomoTarifa",true)} style={S.seg(form.autonomoTarifa,"#f0883e")}>{t.yes} (€86.65/mes)</button>
                    <button onClick={()=>setF("autonomoTarifa",false)} style={S.seg(!form.autonomoTarifa,"#8b949e")}>{t.no}</button>
                  </div>
                </div>
              )}

              <div style={{marginBottom:14}}>
                <label style={S.lbl}>{t.situation}</label>
                <div style={S.row}>{Object.entries(t.sits).map(([k,v])=>(<button key={k} onClick={()=>setF("sit",k)} style={S.seg(form.sit===k)}>{v}</button>))}</div>
              </div>

              <div style={{marginBottom:14}}>
                <label style={S.lbl}>{t.beckham}</label>
                <div style={S.row}>
                  <button onClick={()=>setF("beckham",true)} style={S.seg(form.beckham,"#8957e5")}>{t.beckhamY}</button>
                  <button onClick={()=>setF("beckham",false)} style={S.seg(!form.beckham,"#58a6ff")}>{t.beckhamN}</button>
                </div>
              </div>

              {/* Children */}
              <div style={{marginBottom:14,padding:12,background:"rgba(88,166,255,0.04)",borderRadius:10,border:"1px solid rgba(88,166,255,0.1)"}}>
                <div style={{fontSize:13,fontWeight:700,color:"#58a6ff",marginBottom:10}}>👨‍👩‍👧‍👦 {t.childrenTitle}</div>
                <label style={S.lbl}>{t.numChildren}</label>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                  <button onClick={()=>setF("kids",Math.max(0,form.kids-1))} style={{width:32,height:32,borderRadius:6,border:"1px solid #30363d",background:"#0d1117",color:"#e6edf3",cursor:"pointer",fontSize:16}}>−</button>
                  <span style={{fontSize:20,fontWeight:800,color:"#58a6ff",minWidth:24,textAlign:"center"}}>{form.kids}</span>
                  <button onClick={()=>setF("kids",Math.min(10,form.kids+1))} style={{width:32,height:32,borderRadius:6,border:"1px solid #30363d",background:"#0d1117",color:"#e6edf3",cursor:"pointer",fontSize:16}}>+</button>
                  {form.kids>0&&<span style={{fontSize:11,color:"#8b949e"}}>{lang==="ar"?"إعفاء:":lang==="es"?"Mínimo:":"Allow:"} {fE(childAllow(form.kids,form.under3))}</span>}
                </div>
                {form.kids>0&&(
                  <>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,cursor:"pointer"}} onClick={()=>setF("under3",!form.under3)}>
                      <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${form.under3?"#58a6ff":"#30363d"}`,background:form.under3?"#58a6ff":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        {form.under3&&<span style={{color:"#0d1117",fontSize:11,fontWeight:900}}>✓</span>}
                      </div>
                      <span style={{fontSize:12,color:"#8b949e"}}>{t.childrenUnder3}</span>
                    </div>
                    {form.kids>=3&&(
                      <div>
                        <label style={S.lbl}>{t.fnLabel}</label>
                        <div style={{...S.row,flexWrap:"wrap"}}>
                          {[["no",t.fnNo,"#8b949e"],["general",t.fnGeneral,"#f0883e"],["special",t.fnSpecial,"#ff7b72"]].map(([k,v,c])=>(
                            <button key={k} onClick={()=>setF("fn",k)} style={{...S.seg(form.fn===k,c),fontSize:11,flex:"0 0 auto"}}>{v}</button>
                          ))}
                        </div>
                        {form.fn!=="no"&&<div style={{fontSize:11,color:"#f0883e",marginTop:5}}>💰 Credit: −{fE(fnCredit(form.fn))}</div>}
                      </div>
                    )}
                  </>
                )}
              </div>

              {/* Deductions */}
              <button onClick={()=>setShowDeds(p=>!p)} style={{background:"none",border:"1px solid #30363d",color:"#8b949e",borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:12,marginBottom:showDeds?12:0,width:"100%",textAlign:isRTL?"right":"left"}}>
                {t.deductions}
              </button>
              {showDeds&&(
                <div style={{marginBottom:12}}>
                  {[["rent",t.dedRent],["pension",t.dedPension],["ev",t.dedEv]].map(([k,lbl])=>(
                    <div key={k} style={{marginBottom:10}}><label style={S.lbl}>{lbl}</label><input style={S.inp} type="number" value={form[k]} onChange={e=>setF(k,e.target.value)} placeholder="0"/></div>
                  ))}
                </div>
              )}

              <button onClick={doCalc} style={{...S.calcBtn,marginTop:8}}>{t.calcBtn}</button>
            </div>

            {/* RESULTS */}
            {result&&(
              <div style={S.card}>
                {form.beckham&&<div style={{...S.badge("#8957e5"),marginBottom:12,display:"block"}}>{t.beckhamBadge}</div>}
                <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>{t.resTitle}</div>
                {[
                  [t.totalGross,result.gross,"#e6edf3"],
                  [t.ssTax,result.ss,"#f0883e"],
                  ...(result.ca>0?[[t.childAllowLabel,result.ca,"#58a6ff"]]:[]),
                  [t.irpfTax,result.irpf,"#ff7b72"],
                  ...(result.savTax>0?[[t.savingsTax,result.savTax,"#ffa657"]]:[]),
                  [t.totalTax,result.totalTax,"#ff7b72"],
                  [t.effectRate,result.eff+"%","#e6edf3"],
                  [t.netIncome,result.net,"#3fb950"],
                ].map(([lbl,val,col])=>(
                  <div key={lbl} style={S.resRow}>
                    <span style={{fontSize:13,color:"#8b949e"}}>{lbl}</span>
                    <div style={{textAlign:"end"}}>
                      <span style={{fontSize:16,fontWeight:700,color:col,direction:"ltr"}}>{lbl===t.effectRate?val:fE(val)}</span>
                      {lbl===t.netIncome&&<div style={{fontSize:11,color:"#8b949e",direction:"ltr"}}>{fE(result.net/12)} / {t.monthly}</div>}
                    </div>
                  </div>
                ))}
                {form.beckham&&result.bSave>0&&<div style={{marginTop:10,...S.badge("#3fb950"),display:"block"}}>💰 {t.saving}: {fE(result.bSave)}</div>}

                {!form.beckham&&result.det.length>0&&(
                  <><div style={{fontSize:12,fontWeight:700,color:"#8b949e",margin:"12px 0 8px"}}>{t.bracketsTitle}</div>
                  {result.det.map((b,i)=>(<div key={i} style={S.bRow}><span style={{color:"#8b949e",direction:"ltr"}}>€{fmt(b.min)}–{b.max===Infinity?"∞":`€${fmt(b.max)}`}</span><span style={{color:"#ffa657",fontWeight:700}}>{b.r}%</span><span style={{color:"#ff7b72",fontWeight:700,direction:"ltr"}}>{fE(b.tax)}</span></div>))}</>
                )}
                {result.savDet.length>0&&(
                  <><div style={{fontSize:12,fontWeight:700,color:"#8b949e",margin:"12px 0 8px"}}>{t.savingsTitle}</div>
                  {result.savDet.map((b,i)=>(<div key={i} style={S.bRow}><span style={{color:"#8b949e",direction:"ltr"}}>€{fmt(b.min)}–{b.max===Infinity?"∞":`€${fmt(b.max)}`}</span><span style={{color:"#ffa657",fontWeight:700}}>{b.r}%</span><span style={{color:"#ff7b72",fontWeight:700,direction:"ltr"}}>{fE(b.tax)}</span></div>))}</>
                )}
                {form.type!=="employee"&&result.qIRPF>0&&(
                  <><div style={{fontSize:12,fontWeight:700,color:"#8b949e",margin:"12px 0 8px"}}>{t.autonomoTitle}</div>
                  {[t.q1l,t.q2l,t.q3l,t.q4l].map((q,i)=>(
                    <div key={i} style={{...S.bRow,flexDirection:"column",gap:3,marginBottom:6}}>
                      <span style={{color:"#58a6ff",fontWeight:700}}>{q}</span>
                      <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:"#8b949e",fontSize:11}}>{t.m130}</span><span style={{color:"#ff7b72",fontWeight:600,direction:"ltr"}}>{fE(result.qIRPF)}</span></div>
                      <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:"#8b949e",fontSize:11}}>{t.ivaL}</span><span style={{color:"#ffa657",fontWeight:600,direction:"ltr"}}>{fE(result.qIVA)}</span></div>
                      <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:"#8b949e",fontSize:11}}>SS/month</span><span style={{color:"#f0883e",fontWeight:600,direction:"ltr"}}>{fE(result.qSS)}</span></div>
                    </div>
                  ))}</>
                )}
                <p style={{fontSize:11,color:"#484f58",marginTop:14,lineHeight:1.6}}>{t.disclaimer}</p>

                {!showEmail&&<button onClick={()=>setShowEmail(true)} style={{width:"100%",marginTop:10,padding:"11px",borderRadius:10,border:"1px solid #3fb950",background:"rgba(63,185,80,0.08)",color:"#3fb950",fontWeight:700,cursor:"pointer",fontSize:13}}>📩 {t.sendBtn}</button>}
                {showEmail&&eStat!=="success"&&(
                  <div style={{marginTop:12,padding:14,background:"rgba(63,185,80,0.05)",borderRadius:12,border:"1px solid rgba(63,185,80,0.2)"}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#3fb950",marginBottom:10}}>{t.emailCapTitle}</div>
                    <div style={{marginBottom:10}}><label style={S.lbl}>{t.emailLabel} *</label><input style={S.inp} type="email" value={eForm.email} onChange={e=>setEForm(p=>({...p,email:e.target.value}))} placeholder={t.emailPh}/></div>
                    <div style={{marginBottom:12}}><label style={S.lbl}>{t.phoneLbl}</label><input style={S.inp} type="tel" value={eForm.phone} onChange={e=>setEForm(p=>({...p,phone:e.target.value}))} placeholder={t.phonePh}/></div>
                    <div style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:12,cursor:"pointer"}} onClick={()=>setEForm(p=>({...p,consent:!p.consent}))}>
                      <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${eForm.consent?"#3fb950":"#30363d"}`,background:eForm.consent?"#3fb950":"transparent",flexShrink:0,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
                        {eForm.consent&&<span style={{color:"#0d1117",fontSize:11,fontWeight:900}}>✓</span>}
                      </div>
                      <span style={{fontSize:11,color:"#8b949e",lineHeight:1.5}}>{t.consentTxt}</span>
                    </div>
                    <div style={{fontSize:11,color:"#484f58",marginBottom:12}}>{t.privacyNote}</div>
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={doEmail} disabled={!eForm.email||!eForm.consent||eStat==="sending"} style={{flex:1,padding:"10px",borderRadius:8,border:"none",background:eForm.email&&eForm.consent?"linear-gradient(90deg,#238636,#2ea043)":"#21262d",color:eForm.email&&eForm.consent?"#fff":"#484f58",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                        {eStat==="sending"?t.sendingBtn:t.sendBtn}
                      </button>
                      <button onClick={()=>setShowEmail(false)} style={{padding:"10px 12px",borderRadius:8,border:"1px solid #30363d",background:"transparent",color:"#8b949e",cursor:"pointer",fontSize:12}}>{t.skipBtn}</button>
                    </div>
                    {eStat==="error"&&<div style={{marginTop:8,fontSize:12,color:"#ff7b72"}}>{t.errorMsg}</div>}
                  </div>
                )}
                {eStat==="success"&&<div style={{marginTop:12,padding:14,background:"rgba(63,185,80,0.1)",borderRadius:12,border:"1px solid rgba(63,185,80,0.3)",textAlign:"center"}}><div style={{fontSize:18,marginBottom:4}}>🎉</div><div style={{fontSize:13,fontWeight:700,color:"#3fb950"}}>{t.successMsg}</div></div>}
              </div>
            )}
          </div>
        )}

        {/* TAB 2: AI ADVISOR */}
        {tab===2&&(
          <div style={S.card}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>{t.aiTitle}</div>
            <div style={{fontSize:12,color:"#8b949e",marginBottom:12}}>{t.aiSub}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
              {t.aiSugs.map((s,i)=>(<button key={i} onClick={()=>doAI(s)} style={{padding:"5px 10px",borderRadius:20,border:"1px solid #30363d",background:"transparent",color:"#8b949e",cursor:"pointer",fontSize:11}}>{s}</button>))}
            </div>
            <div style={{minHeight:180,display:"flex",flexDirection:"column",marginBottom:12}}>
              {aiMsgs.map((m,i)=>(<div key={i} style={{display:"flex",justifyContent:m.r==="u"?(isRTL?"flex-start":"flex-end"):(isRTL?"flex-end":"flex-start")}}><div style={S.bubble(m.r)}>{m.t}</div></div>))}
              {aiLoad&&<div style={{display:"flex",justifyContent:isRTL?"flex-end":"flex-start"}}><div style={{...S.bubble("a"),opacity:.7}}>{t.aiThinking} ⏳</div></div>}
            </div>
            <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
              <textarea style={{flex:1,padding:"10px 12px",borderRadius:10,border:"1px solid #30363d",background:"#0d1117",color:"#e6edf3",fontSize:13,outline:"none",resize:"none"}} rows={2} value={aiQ} onChange={e=>setAiQ(e.target.value)} placeholder={t.aiPh} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();doAI();}}}/>
              <button onClick={()=>doAI()} style={{padding:"10px 16px",borderRadius:10,border:"none",background:"linear-gradient(90deg,#1f6feb,#8957e5)",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13}}>{t.aiSend}</button>
            </div>
          </div>
        )}

        {/* TAB 3: DOCS */}
        {tab===3&&(
          <div>
            <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>{t.docsTitle}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
              {tags.map((tg,i)=>(<button key={i} onClick={()=>setDocF(i)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${docF===i?"#58a6ff":"#30363d"}`,background:docF===i?"rgba(88,166,255,0.15)":"transparent",color:docF===i?"#58a6ff":"#8b949e",cursor:"pointer",fontSize:11,fontWeight:600}}>{tg}</button>))}
            </div>
            {filteredDocs.map((d,i)=>(
              <div key={i} style={{display:"flex",gap:12,padding:"12px 14px",background:"#161b22",borderRadius:10,marginBottom:8,border:"1px solid #21262d",alignItems:"flex-start"}}>
                <span style={{fontSize:22,flexShrink:0}}>{d.i}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13,marginBottom:3}}>{d.n}</div>
                  <div style={{fontSize:12,color:"#8b949e",lineHeight:1.5}}>{d.d}</div>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:6}}>
                    {d.t.map(tg=>(<span key={tg} style={{padding:"2px 8px",borderRadius:12,background:"rgba(88,166,255,0.1)",border:"1px solid rgba(88,166,255,0.2)",color:"#58a6ff",fontSize:10}}>{tg}</span>))}
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* TAB 4: CALENDAR */}
        {tab===4&&(
          <div>
            <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>{t.datesTitle}</div>
            {DATES[lang].map((d,i)=>(
              <div key={i} style={{display:"flex",gap:12,padding:"12px 14px",background:d.u?"rgba(231,76,60,0.06)":"#161b22",borderRadius:10,marginBottom:8,border:`1px solid ${d.u?"rgba(231,76,60,0.3)":"#21262d"}`,alignItems:"flex-start"}}>
                <div style={{minWidth:70,background:`${d.c}18`,border:`1px solid ${d.c}44`,borderRadius:8,padding:"5px 6px",textAlign:"center",flexShrink:0}}>
                  <div style={{fontSize:10,color:d.c,fontWeight:700,lineHeight:1.3}}>{d.p}</div>
                </div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                    <span style={{fontWeight:700,fontSize:13,color:d.c}}>{d.l}</span>
                    {d.u&&<span style={{padding:"2px 7px",borderRadius:10,background:"rgba(231,76,60,0.2)",border:"1px solid rgba(231,76,60,0.4)",color:"#e74c3c",fontSize:9,fontWeight:700}}>{t.urgentLabel}</span>}
                  </div>
                  <div style={{fontSize:12,color:"#8b949e",lineHeight:1.5}}>{d.d}</div>
                </div>
              </div>
            ))}
          </div>
        )}

      </div>
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(React.StrictMode, null, React.createElement(App, null))
    );
  </script>
</body>
</html>
